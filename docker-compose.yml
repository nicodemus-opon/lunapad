services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lunapad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lunapad}
      POSTGRES_DB: ${POSTGRES_DB:-lunapad}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lunapad -d lunapad']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  trino:
    # Pin to the version referenced in connections.ts (catalog.management=dynamic behavior).
    image: trinodb/trino:481
    ports:
      - '8067:8080'
    configs:
      # Inline config avoids Coolify's bind-mount path pre-creation (which creates directories
      # at file mount paths, causing "not a directory" errors on container start).
      - source: trino_config
        target: /etc/trino/config.properties
    volumes:
      # New sources are registered by writing a .properties file then restarting Trino
      # (Docker restart:unless-stopped brings it back automatically after graceful shutdown).
      - ./trino/catalog:/etc/trino/catalog
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/v1/info | grep -q ''"starting":false''']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      target: runner
    ports:
      - '3967:3000'
    depends_on:
      db:
        condition: service_healthy
      trino:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Set ORIGIN to the URL your users reach the app at (e.g. https://yourdomain.com).
      # better-auth uses it for trustedOrigins — login won't work if this doesn't match
      # what the browser sends in the Origin header. Override in your deployment panel.
      # Set ORIGIN to the URL your users reach the app at (e.g. https://yourdomain.com).
      # better-auth uses it for trustedOrigins — login won't work if this doesn't match
      # what the browser sends in the Origin header. Override in your deployment panel.
      ORIGIN: ${ORIGIN:-http://localhost:3967}
      # INNGEST_SERVE_HOST tells the Inngest SDK what URL to register functions under.
      # Must be the Docker-internal URL so the Inngest container can reach the app
      # without going through the external reverse proxy.
      INNGEST_SERVE_HOST: ${INNGEST_SERVE_HOST:-http://app:3000}
      TRINO_URL: ${TRINO_URL:-http://trino:8080}
      TRINO_CATALOG_DIR: ${TRINO_CATALOG_DIR:-/trino-catalog}
      # Postgres (pgvector) — use service name, not localhost, inside Docker network.
      DATABASE_URL: ${DATABASE_URL:-postgresql://lunapad:lunapad@db:5432/lunapad}
      # Auth (better-auth) — set real random values before deploying for real.
      # BETTER_AUTH_SECRET signs session tokens; SECRETS_ENCRYPTION_KEY (32 random
      # bytes, base64) encrypts stored connection passwords. Never reuse one for the other.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-to-a-random-32-byte-secret}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-change-me-to-a-random-32-byte-base64-key}
      # Ollama runs on the host machine. host.docker.internal resolves to the host
      # on Docker Desktop (Mac/Windows). On Linux, extra_hosts adds the route.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Inngest: point to the inngest service inside the Docker network.
      # INNGEST_DEV=1 tells the SDK it's in dev mode (skips signature verification).
      INNGEST_DEV: ${INNGEST_DEV:-1}
      INNGEST_BASE_URL: ${INNGEST_BASE_URL:-http://inngest:8288}
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Default dbt project folder — auto-opened (and scaffolded into a dbt-best-practices
      # project if empty) on first load, and used by the Inngest scheduler. Bind-mounted
      # below so it persists on the host and survives `down`/`up`.
      PROJECT_FOLDER: ${PROJECT_FOLDER:-/app/project}
    extra_hosts:
      # On Linux, Docker does not resolve host.docker.internal by default.
      # This maps it to the host gateway so Ollama is reachable from the container.
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./trino/catalog:/trino-catalog
      - ./project:/app/project
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/api/health > /dev/null']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # Inngest dev server — schedule monitoring UI at http://localhost:8288
  # No restart policy: Inngest must start via `docker compose up` so that
  # depends_on ordering is respected. Auto-restart (restart: unless-stopped)
  # bypasses depends_on and causes Inngest to fire backfill crons before the
  # app re-registers its functions, flooding logs with "missing envID" errors.
  inngest:
    image: inngest/inngest:latest
    command: inngest dev -u http://app:3000/api/inngest --no-discovery
    ports:
      - '8267:8288'
    depends_on:
      app:
        condition: service_healthy

# Usage notes:
# - Add a data source: click "Add source" in the Data Sources panel, fill in connection
#   details, and click Save — the source registers with Trino automatically.
# - Built-in tpch sample data is always available:
#   use tpch.tiny.nation, tpch.tiny.orders, etc. in any cell right away.
# - Scheduling: the Inngest UI is available at http://localhost:8267
# - PROJECT_FOLDER (set to /app/project, bind-mounted from ./project) is auto-opened on
#   startup; if it's empty, a dbt-best-practices project is scaffolded into it automatically.
#   Point it elsewhere to use a different default, or just open a different folder from the UI.

volumes:
  pgdata:
  redis-data:

configs:
  trino_config:
    content: |
      coordinator=true
      node-scheduler.include-coordinator=true
      discovery.uri=http://localhost:8080
      catalog.management=dynamic
      catalog.store=file
