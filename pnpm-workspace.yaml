onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
  - protobufjs
allowBuilds:
  # Optional peer deps of better-auth (Prisma/sqlite adapters) — unused, we use the pg/Kysely adapter.
  '@prisma/client': false
  better-sqlite3: false
  core-js: false
  esbuild: true
  protobufjs: true
confirmModulesPurge: false
