# Production-shaped cloud stack for local Docker and Coolify.
# Local:   docker compose -f docker-compose.cloud.yml up --build
# Coolify: use this file as the Docker Compose source.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lunapad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${SERVICE_PASSWORD_64_POSTGRES:-lunapad}}
      POSTGRES_DB: lunapad
    configs:
      - source: init_pgvector
        target: /docker-entrypoint-initdb.d/01-pgvector.sql
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lunapad -d lunapad']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  trino:
    image: trinodb/trino:481
    configs:
      - source: trino_config
        target: /etc/trino/config.properties
      - source: trino_access_control
        target: /etc/trino/access-control.properties
    volumes:
      - trino-catalog:/etc/trino/catalog
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/v1/info | grep -q ''"starting":false''']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  rustfs-permissions:
    image: alpine:3.20
    command: sh -c "mkdir -p /data && chown -R 10001:10001 /data && tail -f /dev/null"
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'stat -c %u:%g /data | grep -qx 10001:10001']
      interval: 2s
      timeout: 2s
      retries: 15

  rustfs:
    image: rustfs/rustfs:latest
    depends_on:
      rustfs-permissions:
        condition: service_healthy
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-lunapad}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-${SERVICE_PASSWORD_64_RUSTFS:-lunapad-local-secret}}
    command: /data
    volumes:
      - rustfs-data:/data
    restart: unless-stopped

  storage-init:
    image: ${LUNAPAD_RUNNER_IMAGE:-${COOLIFY_RESOURCE_UUID:-lunapad}-runner}
    command: sh -c "node scripts/storage-init.mjs && touch /tmp/storage-init-ready && tail -f /dev/null"
    depends_on:
      rustfs:
        condition: service_started
    environment:
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: ${S3_BUCKET:-lunapad-artifacts}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-lunapad}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-${SERVICE_PASSWORD_64_RUSTFS:-lunapad-local-secret}}
      S3_FORCE_PATH_STYLE: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'test -f /tmp/storage-init-ready']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${MAILPIT_PORT_BIND:-127.0.0.1:8025}:8025'
    restart: unless-stopped

  app:
    image: ${LUNAPAD_RUNNER_IMAGE:-${COOLIFY_RESOURCE_UUID:-lunapad}-runner}
    build:
      context: .
      target: runner
    ports:
      - '${APP_PORT_BIND:-127.0.0.1:3967}:3000'
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
      trino:
        condition: service_healthy
      redis:
        condition: service_healthy
      storage-init:
        condition: service_healthy
    environment:
      SERVICE_URL_APP_3000: ${SERVICE_URL_APP_3000:-}
      SERVICE_FQDN_APP_3000: ${SERVICE_FQDN_APP_3000:-}
      ORIGIN: ${ORIGIN:-${SERVICE_URL_APP_3000:-${SERVICE_FQDN_APP_3000:-http://localhost:3967}}}
      PORT: 3000
      HOST: 0.0.0.0
      DEPLOYMENT_MODE: cloud
      PUBLIC_CLOUD_SIGNUP_ENABLED: ${PUBLIC_CLOUD_SIGNUP_ENABLED:-true}
      DATABASE_URL: postgresql://lunapad:${POSTGRES_PASSWORD:-${SERVICE_PASSWORD_64_POSTGRES:-lunapad}}@db:5432/lunapad
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-${SERVICE_PASSWORD_64_AUTH:-change-me-cloud-auth-secret}}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-${SERVICE_HEX_64_SECRETS:-bHVuYXBhZC1sb2NhbC1kZXYtc2VjcmV0LTMyLWJ5dGU=}}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-manual}
      CLOUD_DEFAULT_PLAN: ${CLOUD_DEFAULT_PLAN:-starter}
      CLOUD_EXECUTION_ADAPTER: queue
      CLOUD_QUEUE_WORKER_ENABLED: 'true'
      CLOUD_WORKER_TOKEN: ${CLOUD_WORKER_TOKEN:-${SERVICE_PASSWORD_64_WORKER:-change-me-cloud-worker-token}}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      REDIS_URL: redis://redis:6379
      TRINO_URL: http://trino:8080
      TRINO_CATALOG_DIR: /trino-catalog
      TRINO_ACCESS_CONTROL_RULES_FILE: /tmp/lunapad-access-control.json
      OBJECT_STORAGE_PROVIDER: s3
      S3_ENDPOINT: http://rustfs:9000
      S3_BUCKET: ${S3_BUCKET:-lunapad-artifacts}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY:-lunapad}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY:-${SERVICE_PASSWORD_64_RUSTFS:-lunapad-local-secret}}
      S3_FORCE_PATH_STYLE: 'true'
      SIGNUP_RATE_LIMIT_PER_HOUR: ${SIGNUP_RATE_LIMIT_PER_HOUR:-20}
      PROJECT_FOLDER: /app/project
      PROJECTS_ROOT: /app/projects
      INNGEST_DEV: ${INNGEST_DEV:-1}
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:-local}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:-local}
    volumes:
      - trino-catalog-app:/trino-catalog
      - cloud-project:/app/project
      - cloud-projects:/app/projects
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/api/health > /dev/null']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    image: ${LUNAPAD_RUNNER_IMAGE:-${COOLIFY_RESOURCE_UUID:-lunapad}-runner}
    command: node scripts/cloud-worker.mjs
    depends_on:
      app:
        condition: service_healthy
    environment:
      ORIGIN: ${ORIGIN:-${SERVICE_URL_APP_3000:-${SERVICE_FQDN_APP_3000:-http://localhost:3967}}}
      LUNAPAD_BASE_URL: http://app:3000
      CLOUD_WORKER_TOKEN: ${CLOUD_WORKER_TOKEN:-${SERVICE_PASSWORD_64_WORKER:-change-me-cloud-worker-token}}
      CLOUD_WORKER_CONCURRENCY: ${CLOUD_WORKER_CONCURRENCY:-2}
    restart: unless-stopped

  inngest:
    image: inngest/inngest:latest
    command: inngest dev -u http://app:3000/api/inngest --no-discovery
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
  rustfs-data:
  trino-catalog:
  trino-catalog-app:
  cloud-project:
  cloud-projects:

configs:
  init_pgvector:
    content: |
      CREATE EXTENSION IF NOT EXISTS vector;
  trino_config:
    content: |
      coordinator=true
      node-scheduler.include-coordinator=true
      discovery.uri=http://localhost:8080
      catalog.management=dynamic
      catalog.store=file
  trino_access_control:
    content: |
      access-control.name=allow-all
