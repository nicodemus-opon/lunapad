<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
		<script>
			// Runs synchronously before first paint — applies saved theme before CSS paints
			(function () {
				try {
					var raw = localStorage.getItem('lunapad_notebook');
					if (!raw) return;
					var data = JSON.parse(raw);
					var theme = data.theme || 'system';
					var dark =
						theme === 'dark' ||
						(theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.classList.toggle('dark', dark);
					document.documentElement.classList.toggle('light', !dark);
				} catch (_) {
					/* ignore corrupt storage */
				}
			})();

			// Runs synchronously before first paint — applies the cached workspace
			// brand theme (src/lib/types/theme.ts) before CSS paints, mirroring the
			// block above. Kept in sync with buildThemeOverrideCss() in
			// src/lib/services/workspace-theme.svelte.ts, which +layout.svelte uses
			// to reconcile with the server's current value after mount.
			(function () {
				try {
					var raw = localStorage.getItem('lunapad_workspace_theme');
					if (!raw) return;
					var theme = JSON.parse(raw);
					var toCss = function (tokens) {
						var out = '';
						for (var key in tokens) {
							var value = tokens[key];
							if (typeof value === 'string' && value.trim()) out += key + ': ' + value + '; ';
						}
						return out;
					};
					var lightCss = toCss(theme.light || {});
					var darkCss = toCss(theme.dark || {});
					if (!lightCss && !darkCss) return;
					var css = '';
					if (lightCss) css += ':root { ' + lightCss + '}\n';
					if (darkCss) css += '.dark { ' + darkCss + '}\n';
					var style = document.createElement('style');
					style.id = 'workspace-theme-override';
					style.textContent = css;
					document.head.appendChild(style);
				} catch (_) {
					/* ignore corrupt storage */
				}
			})();

			// Runs synchronously before first paint — prevents traffic-light overlap flash
			if (typeof window !== 'undefined' && window.__TAURI_INTERNALS__) {
				var p = navigator.platform.toLowerCase();
				var u = navigator.userAgent.toLowerCase();
				var r = document.documentElement;
				r.dataset.platform = 'tauri';
				if (p.includes('mac') || u.includes('macintosh')) {
					r.dataset.os = 'macos';
					r.style.setProperty('--titlebar-inset-left', '96px');
				} else if (p.includes('win')) {
					r.dataset.os = 'windows';
					r.style.setProperty('--titlebar-inset-right', '138px');
				} else if (p.includes('linux')) {
					r.dataset.os = 'linux';
					r.style.setProperty('--titlebar-inset-right', '138px');
				}
			}
		</script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
