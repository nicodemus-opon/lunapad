# Full dev stack with live reload — same services as docker-compose.yml (db, trino,
# inngest, app), just with `app` running Vite dev instead of the production build.
#
# Usage: docker compose -f docker-compose.dev.yml up
# (single file — `include` below pulls in db/trino/inngest from docker-compose.yml,
# so this isn't a partial override you have to combine with -f -f.)
#
# Source is bind-mounted, so edits on the host hot-reload inside the container.
include:
  - docker-compose.yml

services:
  app:
    build:
      target: dev
    ports:
      - "5173:5173"
    environment:
      ORIGIN: http://localhost:5173
      # Dev server is on 5173 — override the prod INNGEST_SERVE_HOST so the Inngest SDK
      # registers functions at the correct port inside the Docker network.
      INNGEST_SERVE_HOST: http://app:5173
      VITE_DOCKER_DEV: "1"
    volumes:
      - .:/app
      # Anonymous volumes shadow the bind mount for these paths so the container's
      # own (Linux) install isn't clobbered by the host's (e.g. macOS) node_modules.
      - /app/node_modules
      - /app/.svelte-kit
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5173/api/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # Override the command inherited from docker-compose.yml: the dev app listens on
  # 5173 (Vite), not the production container's 3000, so Inngest must sync against
  # that port or it can never find the app ("can't find your application" in the UI).
  inngest:
    command: inngest dev -u http://app:5173/api/inngest --no-discovery
